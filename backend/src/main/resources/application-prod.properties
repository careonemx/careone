# ===== Overrides para perfil 'prod' =====
# Activar con: SPRING_PROFILES_ACTIVE=prod

# Todos los secretos y URLs vienen OBLIGATORIAMENTE de variables de entorno.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Pool mas grande en produccion.
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:20}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:5}

# Nada de SQL en logs en produccion.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT secret obligatorio (sin default en prod).
careone.security.jwt.secret=${JWT_SECRET}

# CORS estricto: solo el dominio real del frontend.
careone.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Logs sin PII ni detalle excesivo.
logging.level.root=WARN
logging.level.com.careone.api=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# Errores genericos al cliente.
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# Actuator: solo health, sin detalles.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
