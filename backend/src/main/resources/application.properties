spring.application.name=careone-api

# ===== Datasource (PostgreSQL) =====
# Una sola fuente de verdad: las variables POSTGRES_* del .env (las mismas que usa
# docker-compose). Asi el backend conecta igual desde VS Code (Java local) que
# desde Docker:
#   - VS Code (Java local): SPRING_DATASOURCE_URL no se define -> usa el default
#     localhost:5433/<POSTGRES_DB>, con el usuario/password del .env.
#   - Docker: docker-compose define SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/...
#     que sobreescribe el default.
# La URL: por defecto localhost:5433/careone (VS Code). Docker la sobreescribe con
# SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/<POSTGRES_DB> (ver docker-compose.yml).
# Sin placeholder anidado en el default (Spring no lo resuelve de forma fiable).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/careone}
# Usuario y password: directos de POSTGRES_* (mismas en VS Code y Docker via .env).
# Evitamos placeholders anidados en el default: Spring no los resuelve de forma fiable.
spring.datasource.username=${POSTGRES_USER:careone}
spring.datasource.password=${POSTGRES_PASSWORD:careone}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== HikariCP (pool de conexiones) =====
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:2}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ===== JPA / Hibernate =====
# Flyway gestiona el esquema; Hibernate NUNCA toca DDL.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=false
# En desarrollo mostramos SQL; en prod se apaga (ver application-prod.properties).
spring.jpa.show-sql=true

# ===== Flyway =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ===== Seguridad / JWT =====
# Secret en Base64; OBLIGATORIO sobreescribir por entorno. El default solo sirve para arrancar en dev.
careone.security.jwt.secret=${JWT_SECRET:ZGV2LW9ubHktY2FyZW9uZS1zZWNyZXQtY2hhbmdlLW1lLWluLXByb2QtMzJieXRlcw==}
careone.security.jwt.access-token-ttl-seconds=${JWT_ACCESS_TTL:900}
careone.security.jwt.refresh-token-ttl-seconds=${JWT_REFRESH_TTL:1209600}
careone.security.jwt.issuer=careone

# ===== CORS (origenes permitidos del frontend) =====
careone.security.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost,http://localhost:80,http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176}

# ===== Seed Superadmin (Fase 3) =====
careone.superadmin.email=${SUPERADMIN_EMAIL:superadmin@careone.local}
careone.superadmin.password=${SUPERADMIN_PASSWORD:ChangeMe!Dev123}

# ===== Almacenamiento de archivos (consentimientos, documentos) =====
# Para VS Code local usamos un dir relativo; en Docker se monta un volumen.
careone.storage.dir=${STORAGE_DIR:./storage}

# ===== Subida de archivos (multipart) =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB

# ===== Actuator =====
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ===== Servidor =====
server.port=8080
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never
server.shutdown=graceful

# En Spring Boot 4 NoHandlerFoundException ya se lanza por defecto; basta deshabilitar
# el mapeo de recursos estaticos para que las rutas inexistentes lleguen al handler 404.
spring.web.resources.add-mappings=false
